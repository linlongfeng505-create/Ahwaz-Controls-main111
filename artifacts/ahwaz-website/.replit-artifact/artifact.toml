kind = "web"
previewPath = "/"
title = "Ahwaz Controls Website"
version = "1.0.0"
id = "artifacts/ahwaz-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19686

[services.development]
run = "pnpm --filter @workspace/ahwaz-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ahwaz-website", "run", "build" ]
publicDir = "artifacts/ahwaz-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19686"
BASE_PATH = "/"
